*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
url('https://i.postimg.cc/wxD7nqzr/b5170a6aa402df25ba6f160fb3abf014.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:430px;
}

.card{
background:rgba(17,17,17,.75);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:32px 24px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,255,255,.08);
margin-bottom:18px;
}

h1{
font-size:38px;
font-weight:800;
margin-bottom:18px;
letter-spacing:1px;

background:linear-gradient(
180deg,
#ff8a8a 0%,
#ff3b3b 35%,
#ff0000 60%,
#8b0000 100%
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;

text-shadow:
0 0 8px rgba(255,0,0,.4),
0 0 16px rgba(255,0,0,.3),
0 0 24px rgba(255,0,0,.2);
}

.buttons{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:30px;
}

.btn{
text-decoration:none;
color:white;
background:#1b1b1b;
border:1px solid #2a2a2a;
padding:12px 22px;
border-radius:14px;
transition:.2s;
font-weight:500;
}

.btn:hover{
background:#252525;
transform:translateY(-2px);
}

.section-title{
font-size:20px;
font-weight:600;
margin-bottom:18px;
}
</style>
</head>
